name: Cerrar intervenciones 22h

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  cerrar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cerrar intervenciones abiertas
        run: |
          npm install firebase-admin
          node close.js
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
